# Copy to:  <MIMIR repo>/.mimir/config.yaml
# (config.yaml is gitignored — keep machine-specific paths local)
#
# Optional: set MIMIR_CONFIG_PATH to an absolute path to use a config file elsewhere.

obsidian:
  # false = never mirror from this file (env MIMIR_OBSIDIAN_VAULT_PATH still enables if set)
  enabled: true

  # Absolute path to your Obsidian vault root (folder containing .obsidian)
  vault_path: "N:/WIKI/atlas_wiki/vault"

  # Folder name under KGRAPH/<project_slug>/ (knowledge graph mirror)
  project_slug: mimir

  # Optional: mimir_project_name in 01_PROJECTS/<slug>.md frontmatter (default: project_slug). README is embedded verbatim — no extra H1 added.
  # project_name: "Mimir"

  # Optional: README to embed in that note — absolute path, or relative to Mimir repo root
  # (default if omitted: <MIMIR repo>/README.md when it exists)
  # readme_path: "README.md"

  # Optional overrides (usually omit — defaults are fine)
  # mirror_rel: "KGRAPH/mimir"   # full mirror root under vault (default: KGRAPH/<project_slug>)
  # base: "Mimir"                 # legacy: single folder under vault
